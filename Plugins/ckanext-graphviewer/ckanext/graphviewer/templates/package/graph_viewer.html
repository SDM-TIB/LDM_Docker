{% extends "page.html" %}

{% block main_content %}
<div class="container" style="margin-top: 20px;">
    <h2>RDF Graph Visualization</h2>

    <div id="canvas_container" style="width: 100%; height: 1234px; border: 1px solid #ddd; overflow: hidden; position: relative;">
        <canvas id="the_canvas_id" style="width: 100%; height: 100%; display: block;"></canvas>
    </div>

    <canvas
        {% if pkg_dict %}
        id="the_canvas_id"
        data-pkg-dict="{{ pkg_dict | tojson | forceescape }}"
        data-n3-url="{{ h.url_for('home', qualified=True) }}{{ pkg_type }}/{{ pkg_dict.id }}.n3"
        {% endif %}
    </canvas>

    <script type="module">
     import init from '/graph_viewer/rdf_wasm_graph.js';

     async function run() {
         try {
             await init('/graph_viewer/rdf_wasm_graph_bg.wasm');
             console.log("WASM Initialized");
         } catch (e) {
             console.error("WASM Loading Failed:", e);
         }
     }

     run();
    </script>
</div>
{% endblock %}
