
version: "3"

volumes:
  ckan_config:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: './docker_volumes/ckan_config'
  ckan_storage:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: './docker_volumes/ckan_storage'
  pg_data:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: './docker_volumes/pg_data'
  solr_data:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: './docker_volumes/solr_data'
  jupyterhub_data:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: './docker_volumes/jupyterhub_data'
  kg_data:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: './docker_volumes/kg_data'

services:
  traefik:
    image: traefik:v3.7
    container_name: traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ldmnetwork

  kg_exploration:
    container_name: kg_exploration
    restart: unless-stopped
    image: ghcr.io/sdm-tib/fair_rdm_kg_exploration:b8a0002
    ports:
      - "5742:5742"
    networks:
      - ldmnetwork
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kge.rule=PathPrefix(`/kg_exploration`)"
      - "traefik.http.routers.kge.priority=10"         # higher than catch-all
      - "traefik.http.services.kge.loadbalancer.server.port=5742"

  ckan:
    container_name: ckan
    restart: unless-stopped
    image: ckan
    build:
      context: .
      args:
          - CKAN_CONFIG_L=${CKAN_CONFIG}
          - CKAN_HOME_L=${CKAN_HOME}
          - CKAN_STORAGE_PATH_L=${CKAN_STORAGE_PATH}
          - CKAN_VER=${CKAN_VERSION}
    links:
      - db
      - solr
      - redis
#      - pusher
#      - postfix
      - jupyterhub
      
    depends_on:
      - db
      - solr
      - redis
#      - pusher
#      - postfix
      - jupyterhub
    ports:
      - "5000:5000"
    env_file:
      - .env

    volumes:
      - ckan_config:${CKAN_CONFIG}
      - ckan_storage:${CKAN_STORAGE_PATH}
    networks:
      - ldmnetwork
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ldmservice.rule=PathPrefix(`/`)"
      - "traefik.http.routers.ldmservice.priority=1"          # lowest priority — catch-all
      - "traefik.http.routers.ldmservice.middlewares=ldmservice-cors"
      - "traefik.http.middlewares.ldmservice-cors.headers.accesscontrolalloworiginlist=*"
      - "traefik.http.services.ldmservice.loadbalancer.server.port=5000"

  db:
    build: ./postgresql-loaded/
    container_name: db
    restart: unless-stopped
    image: postgresql:loaded
    environment:
      - DS_RO_PASS=${DATASTORE_READONLY_PASSWORD}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
#    ports:
#      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - ldmnetwork
      
  solr:
    container_name: solr
    restart: unless-stopped
    build: 
      context: ./solr/
    image: ckan/ckan-solr:2.10
#    ports:
#      - "8983:8983"
    volumes:
     - solr_data:/var/solr
    networks:
      - ldmnetwork

  redis:
    container_name: redis
    image: redis:6.0.9
    restart: unless-stopped
    networks:
      - ldmnetwork
 
 # pusher:
 #   container_name: datapusher
 #   image: clementmouchet/datapusher
 #   ports:
 #     - "8800:8800"
 
#  postfix:
#    container_name: postfix
#    image: tozd/postfix:ubuntu-trusty
#    ports:
#      - "25:25"
#    environment:
#       MY_NETWORKS: "172.18.0.0/16 127.0.0.0/8"
#    networks:
#      - ldmnetwork    

  jupyterhub:
    container_name: jupyterhub
    restart: unless-stopped
    build: 
      context: ./jupyterhub/
      args:
          - CKAN_STORAGE_PATH=${CKAN_STORAGE_PATH}
          - CKAN_SITE_URL=${CKAN_SITE_URL}
          - CKAN_JUPYTERNOTEBOOK_URL=${CKAN_JUPYTERNOTEBOOK_URL}
    image: my_jupyterhub
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - jupyterhub_data:/srv/jupyterhub/data
      - ckan_storage:${CKAN_STORAGE_PATH}:ro
    ports:
      - "8000:8000"
      - "6000:6000"
    env_file:
      - .env
    networks:
      - ldmnetwork
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ldmjupyter.rule=PathPrefix(`/ldmjupyter`)"
      - "traefik.http.routers.ldmjupyter.priority=10"         # higher than catch-all
      - "traefik.http.services.ldmjupyter.loadbalancer.server.port=8000"

  ldm_kg:
    container_name: ldm_kg
    image: kemele/virtuoso:7-stable
    restart: unless-stopped
    ports:
      - "8890:8890"
    volumes:
      - kg_data:/data
      - ./rdf_metadata:/data/toLoad
    networks:
      - ldmnetwork
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ldmkg.rule=Path(`/ldmkg/sparql`)"
      - "traefik.http.routers.ldmkg.priority=10"              # higher than catch-all
      - "traefik.http.routers.ldmkg.middlewares=ldmkg-rewrite"
      - "traefik.http.middlewares.ldmkg-rewrite.replacepathregex.regex=^/ldmkg/sparql(.*)"
      - "traefik.http.middlewares.ldmkg-rewrite.replacepathregex.replacement=/sparql$$1"
      - "traefik.http.services.ldmkg.loadbalancer.server.port=8890"
      - "traefik.http.routers.ldmkg-redirect.rule=Path(`/ldmkg`)"
      - "traefik.http.routers.ldmkg-redirect.priority=10"
      - "traefik.http.routers.ldmkg-redirect.middlewares=ldmkg-redirect-to-sparql"
      - "traefik.http.middlewares.ldmkg-redirect-to-sparql.redirectregex.regex=^(.*)/ldmkg$$"
      - "traefik.http.middlewares.ldmkg-redirect-to-sparql.redirectregex.replacement=$${1}/ldmkg/sparql"
      - "traefik.http.middlewares.ldmkg-redirect-to-sparql.redirectregex.permanent=true"

networks:
  ldmnetwork:  
    external: true

